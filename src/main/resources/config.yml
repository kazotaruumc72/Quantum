# ═══════════════════════════════════════════════════════════════
#  QUANTUM CONFIGURATION
#  Plugin de stockage virtuel et système d'ordres avancé
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# DATABASE
# ───────────────────────────────────────────────────────────────
database:
  # Type de base de données: "mysql" ou "sqlite"
  # Note: Actuellement, seul MySQL est supporté
  type: "mysql"
  
  # Configuration MySQL
  mysql:
    host: "localhost"
    port: 3306
    database: "quantum"
    username: "quantum_user"
    password: "password"


# ───────────────────────────────────────────────────────────────
# ECONOMY
# ───────────────────────────────────────────────────────────────
# 
# Configuration des monnaies du serveur
# La première monnaie définie est la monnaie principale (utilisée par Vault)
# 
# Le champ 'symbol' accepte :
#   - Caractères classiques : "$", "€", "£", "¥"
#   - Unicode / emojis : "⛃", "◉", "✦"
#   - Glyphes Nexo (MiniMessage) : "<glyph:coin_icon>"
#   - Glyphes Nexo (PlaceholderAPI) : "%nexo_glyphid%"
# 
# Format disponible pour 'format':
#   %amount%   - Le montant formaté (ex: 1234.56)
#   %symbol%   - Le symbole de la monnaie
#   %currency% - Le nom de la monnaie (singulier ou pluriel)
# 
# Placeholders PlaceholderAPI (monnaie principale):
#   %quantum_eco_balance%                - Solde brut
#   %quantum_eco_balance_formatted%      - Solde formaté avec symbole
#   %quantum_eco_symbol%                 - Symbole de la monnaie
#   %quantum_eco_currency%               - Nom (singulier)
#   %quantum_eco_currency_plural%        - Nom (pluriel)
#   %quantum_eco_total_buy%              - Total des achats
#   %quantum_eco_total_sell%             - Total des ventes
#   %quantum_eco_net_profit%             - Profit net
#   %quantum_eco_transactions%           - Nombre de transactions
# 
# Placeholders par monnaie (remplacer <id> par l'identifiant):
#   %quantum_eco_<id>_balance%           - Solde
#   %quantum_eco_<id>_balance_formatted% - Solde formaté
#   %quantum_eco_<id>_symbol%            - Symbole
#   %quantum_eco_<id>_currency%          - Nom (singulier)
#   %quantum_eco_<id>_currency_plural%   - Nom (pluriel)
#
# Exemples pour les Gems:
#   %quantum_eco_gems_balance%           - Solde brut des gems
#   %quantum_eco_gems_balance_formatted% - Solde des gems formaté (ex: 100 ◆)
#   %quantum_eco_gems_symbol%            - Symbole des gems (◆)
#   %quantum_eco_gems_currency%          - Nom singulier (Gem)
#   %quantum_eco_gems_currency_plural%   - Nom pluriel (Gems)
#
economy:
  currencies:
    # Monnaie principale (Dollar) - utilisée par Vault
    dollar:
      name: "Dollar"
      name-plural: "Dollars"
      symbol: "$"
      starting-balance: 0.0
      format: "%amount%%symbol%"
    # Monnaie secondaire (Gems) - Placeholder: %quantum_eco_gems_balance%
    gems:
      name: "Gem"
      name-plural: "Gems"
      symbol: "◆"
      starting-balance: 0.0
      format: "%amount% %symbol%"
    # Exemple avec un glyphe Nexo (décommentez pour activer)
    # token:
    #   name: "Token"
    #   name-plural: "Tokens"
    #   symbol: "<glyph:token_icon>"    # Glyphe Nexo via MiniMessage
    #   starting-balance: 0.0
    #   format: "%amount% %symbol%"
    # Exemple avec un glyphe Nexo via PlaceholderAPI
    # gem:
    #   name: "Gem"
    #   name-plural: "Gems"
    #   symbol: "%nexo_gem_icon%"       # Glyphe Nexo via PlaceholderAPI
    #   starting-balance: 0.0
    #   format: "%symbol% %amount%"
    # Exemple avec un caractère Unicode
    # coin:
    #   name: "Coin"
    #   name-plural: "Coins"
    #   symbol: "◉"                     # Caractère Unicode
    #   starting-balance: 0.0
    #   format: "%amount% %symbol%"

# ───────────────────────────────────────────────────────────────
# STORAGE
# ───────────────────────────────────────────────────────────────
storage:
  # Intervalle de sauvegarde automatique (en secondes)
  auto-save-interval: 300 # 5 minutes
  
  # Capacité maximale par joueur (-1 = illimité)
  max-capacity: -1

# ───────────────────────────────────────────────────────────────
# ORDERS SYSTEM
# ───────────────────────────────────────────────────────────────
orders:
  # ╭──────────────────────────────────────────────────────╮
  # │  DURÉES DES ORDRES (via LuckPerms)                  │
  # ╰──────────────────────────────────────────────────────╯
  # 
  # Durée de vie des ordres en fonction des permissions
  # Le système vérifie les permissions dans l'ordre (du plus haut au plus bas)
  # et applique la première permission trouvée
  # 
  # Format: "permission": durée_en_jours
  # 
  # Exemple de permissions LuckPerms:
  #   /lp group vip permission set quantum.orders.vip true
  #   /lp group mvp permission set quantum.orders.mvp true
  # 
  durations:
    "quantum.orders.elite": 90   # ⭐ Elite: 90 jours (3 mois)
    "quantum.orders.mvp+": 60    # 💎 MVP+: 60 jours (2 mois)
    "quantum.orders.mvp": 30     # 💎 MVP: 30 jours (1 mois)
    "quantum.orders.vip+": 14    # ⭐ VIP+: 14 jours (2 semaines)
    "quantum.orders.vip": 7      # ⭐ VIP: 7 jours (1 semaine)
    default: 3                   # 👤 Par défaut: 3 jours
  
  # ╭──────────────────────────────────────────────────────╮
  # │  LIMITE D'ORDRES ACTIFS (via LuckPerms)             │
  # ╰──────────────────────────────────────────────────────╯
  # 
  # Nombre maximum d'ordres actifs simultanés par joueur
  # Permet de limiter le spam et de récompenser les rangs supérieurs
  # 
  # Format: "permission": nombre_d_ordres
  # 
  max-active-orders:
    "quantum.orders.elite": 100  # ⭐ Elite: 100 ordres simultanés
    "quantum.orders.mvp+": 40    # 💎 MVP+: 40 ordres simultanés
    "quantum.orders.mvp": 20     # 💎 MVP: 20 ordres simultanés
    "quantum.orders.vip+": 10    # ⭐ VIP+: 10 ordres simultanés
    "quantum.orders.vip": 5      # ⭐ VIP: 5 ordres simultanés
    default: 3                   # 👤 Par défaut: 3 ordres simultanés
  
  # ╭──────────────────────────────────────────────────────╮
  # │  CHRONOMÈTRE & AFFICHAGE                           │
  # ╰──────────────────────────────────────────────────────╯
  # 
  # Configuration du temps restant sur les ordres
  # 
  timer:
    enabled: true
    
    # Format du temps restant
    # Placeholders disponibles:
    #   %days%    - Jours restants
    #   %hours%   - Heures restantes
    #   %minutes% - Minutes restantes
    #   %seconds% - Secondes restantes
    # 
    # Supports MiniMessage pour les couleurs:
    #   <red>, <green>, <blue>, <yellow>, etc.
    #   <gradient:#color1:#color2>texte</gradient>
    #   <#HEX>texte</#HEX>
    # 
    format: "<#32b8c6>%days%j %hours%h %minutes%m %seconds%s"
    
    # Message affiché quand l'ordre est expiré
    format-expired: "<red>❌ Expiré"
  
  # ╭──────────────────────────────────────────────────────╮
  # │  NETTOYAGE AUTOMATIQUE                              │
  # ╰──────────────────────────────────────────────────────╯
  # 
  # Intervalle de nettoyage des ordres expirés (en secondes)
  cleanup-interval: 600 # 10 minutes

# ───────────────────────────────────────────────────────────────
# MESSAGES
# ───────────────────────────────────────────────────────────────
# 
# ℹ️ TOUS LES MESSAGES SONT MAINTENANT DANS messages.yml
# 
# Le fichier messages.yml centralise tous les messages du plugin
# pour faciliter la maintenance, la traduction et la personnalisation.
# 
# Pour modifier les messages:
#   1. Éditez src/main/resources/messages.yml
#   2. Rechargez avec /quantum reload messages
# 
# ───────────────────────────────────────────────────────────────

# ───────────────────────────────────────────────────────────────
# LEVELS
# ───────────────────────────────────────────────────────────────
levels:
  # Niveau maximum que peut atteindre un joueur
  max-level: 1000


# ───────────────────────────────────────────────────────────────
# JOIN / LEAVE / FIRST JOIN MESSAGES
# ───────────────────────────────────────────────────────────────
#
# Messages personnalisés pour les connexions/déconnexions
# Support des rangs LuckPerms (premier rang trouvé = utilisé)
# Support MiniMessage pour les couleurs et formatage
#
# Placeholders disponibles:
#   %player% - Nom du joueur
#   %online% - Nombre de joueurs en ligne
#   %max_players% - Nombre max de joueurs
#
join-leave:
  # Message de première connexion (nouveaux joueurs)
  firstjoin:
    enabled: true
    message: "<gradient:#FFD700:#FFA500>★</gradient> <green>Bienvenue <white>%player%</white> sur le serveur !</green> <gradient:#FFD700:#FFA500>★</gradient>"
  
  # Messages de connexion par rang LuckPerms
  # Le premier rang trouvé (du plus haut au plus bas) est utilisé
  join:
    enabled: true
    formats:
      "quantum.join.elite": "<gradient:#FFD700:#FFA500>⭐</gradient> <gold>[Elite]</gold> <white>%player%</white> <gray>a rejoint le serveur</gray>"
      "quantum.join.mvp+": "<light_purple>💎</light_purple> <dark_purple>[MVP+]</dark_purple> <white>%player%</white> <gray>a rejoint le serveur</gray>"
      "quantum.join.mvp": "<light_purple>💎</light_purple> <dark_purple>[MVP]</dark_purple> <white>%player%</white> <gray>a rejoint le serveur</gray>"
      "quantum.join.vip+": "<yellow>⭐</yellow> <gold>[VIP+]</gold> <white>%player%</white> <gray>a rejoint le serveur</gray>"
      "quantum.join.vip": "<yellow>⭐</yellow> <gold>[VIP]</gold> <white>%player%</white> <gray>a rejoint le serveur</gray>"
    default: "<gray>➤</gray> <white>%player%</white> <gray>a rejoint le serveur</gray>"
  
  # Messages de déconnexion par rang LuckPerms
  leave:
    enabled: true
    formats:
      "quantum.join.elite": "<gradient:#FFD700:#FFA500>⭐</gradient> <gold>[Elite]</gold> <white>%player%</white> <gray>a quitté le serveur</gray>"
      "quantum.join.mvp+": "<light_purple>💎</light_purple> <dark_purple>[MVP+]</dark_purple> <white>%player%</white> <gray>a quitté le serveur</gray>"
      "quantum.join.mvp": "<light_purple>💎</light_purple> <dark_purple>[MVP]</dark_purple> <white>%player%</white> <gray>a quitté le serveur</gray>"
      "quantum.join.vip+": "<yellow>⭐</yellow> <gold>[VIP+]</gold> <white>%player%</white> <gray>a quitté le serveur</gray>"
      "quantum.join.vip": "<yellow>⭐</yellow> <gold>[VIP]</gold> <white>%player%</white> <gray>a quitté le serveur</gray>"
    default: "<gray>➤</gray> <white>%player%</white> <gray>a quitté le serveur</gray>"

# ───────────────────────────────────────────────────────────────
# NOTES
# ───────────────────────────────────────────────────────────────
# 
# 🔑 PERMISSIONS LUCKPERMS:
# 
# Pour donner les permissions à un groupe:
#   /lp group <groupe> permission set quantum.orders.vip true
# 
# Pour donner les permissions à un joueur:
#   /lp user <joueur> permission set quantum.orders.vip true
# 
# Ordre de priorité (le plus haut est vérifié en premier):
#   1. elite   - 90 jours & 100 ordres
#   2. mvp+    - 60 jours & 40 ordres
#   3. mvp     - 30 jours & 20 ordres
#   4. vip+    - 14 jours & 10 ordres
#   5. vip     - 7 jours & 5 ordres
#   6. default - 3 jours & 3 ordres
# 
# 📝 COMMANDES:
# 
# Joueurs:
#   /offre <item> <quantité> <prix>  - Créer une offre d'achat
#   /rechercher                        - Ouvrir le menu des catégories
#   /recherche <catégorie>             - Voir les offres d'une catégorie
# 
# Admin:
#   /quantum reload                              - Recharger la config
#   /quantum orders button createcategorie <nom> - Créer une catégorie
#   /quantum orders button deletecategorie <nom> - Supprimer une catégorie
#
# ───────────────────────────────────────────────────────────────

# ───────────────────────────────────────────────────────────────
# MENU BUILDER WEB INTERFACE
# ───────────────────────────────────────────────────────────────
#
# Client-side menu builder configuration
# Access the web interface at: http://localhost:{port}
#
# This web interface allows administrators to:
#   - Create and edit menus visually
#   - Configure menu items with drag-and-drop
#   - Preview menus in real-time
#   - Manage all menu files from a browser
#
# Security note: The web interface should only be accessible from
# trusted networks. Consider using a firewall or reverse proxy with
# authentication if exposing to the internet.
#
menu-builder:
  # Enable the web interface (default: true)
  enabled: true

  # Port for the web server (default: 8080)
  # Make sure this port is not used by another application
  port: 8080

  # Admin token for API access (optional, leave empty to disable)
  # If set, all API requests must include this token in the Authorization header
  # Example: Authorization: Bearer your-secure-token-here
  admin-token: ""
#
# ───────────────────────────────────────────────────────────────
