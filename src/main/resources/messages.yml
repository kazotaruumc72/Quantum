  no-permission: "<red>✖ Vous n'avez pas la permission!</red>"
  received: "<green>✔ Vous avez reçu un outil Quantum!</green>"
  creation-error: "<red>✖ Erreur lors de la création de l'outil!</red>"
  invalid-type: "<red>✖ Type invalide! Utilisez: pickaxe, axe, ou hoe</red>"
  usage-give: "<yellow>Utilisation: /tool give <type> <niveau></yellow>"
  
  info:
    pickaxe:
      header: "<yellow>=== Pioche Quantum ===</yellow>"
      level: "<gray>Niveau: <green>%level%</green></gray>"
      multiplier: "<gray>Multiplicateur: <green>x%multiplier%</green></gray>"
