commands:
  player-only: "<red>✖ Cette commande ne peut être exécutée que par un joueur!</red>"
  no-permission: "<red>✖ Vous n'avez pas la permission d'utiliser cette commande!</red>"
  invalid-player: "<red>✖ Joueur introuvable: <yellow>%player%</yellow></red>"
  menu-opened: "<green>✔ Menu ouvert: <yellow>%menu_name%</yellow></green>"
  menu-usage: "<yellow>Usage: /menu <menu_name></yellow>"
