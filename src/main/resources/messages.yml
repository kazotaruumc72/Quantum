# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                    QUANTUM STORAGE - MESSAGES.YML                        ║
# ║                    Centralisation des messages système                   ║
# ║                     Support: Legacy & MiniMessage                        ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# NOTE: Les messages GUI sont dans messages_gui.yml
#
# ┌───────────────────────────────────────────────────────────────────────────┐
# │  FORMAT DES MESSAGES                                                      │
# ├───────────────────────────────────────────────────────────────────────────┤
# │  • Legacy: &a, &b, &c, &l, &n, etc.                                       │
# │  • MiniMessage: <green>, <gradient>, <rainbow>, etc.                      │
# │  • Placeholders: %quantum_*%, %player%, etc.                              │
# └───────────────────────────────────────────────────────────────────────────┘

# ═══════════════════════════════════════════════════════════════════════════
#   📋 SECTION 1: MESSAGES SYSTÈME
# ═══════════════════════════════════════════════════════════════════════════

system:
  prefix: "<gradient:#32b8c6:#1d6880>[Quantum]</gradient> "
  no-permission: "<red>✖ Vous n'avez pas la permission d'utiliser cette commande.</red>"
  player-only: "<red>✖ Cette commande ne peut être exécutée que par un joueur.</red>"
  reload-success: "<green>✔ Configuration rechargée avec succès !</green>"
  reload-error: "<red>✖ Erreur lors du rechargement de la configuration.</red>"
  unknown-command: "<red>✖ Commande inconnue. Utilisez /quantum help pour l'aide.</red>"

# ═══════════════════════════════════════════════════════════════════════════
#   💰 SECTION 2: MESSAGES DE VENTE
# ═══════════════════════════════════════════════════════════════════════════

sell:
  success: "<green>✔ Vous avez vendu <white>%quantity%x %item%</white> pour <gold>%price%€</gold>!</green>"
  insufficient-stock: "<red>✖ Stock insuffisant ! Vous n'avez que <white>%current%x</white>.</red>"
  invalid-amount: "<red>✖ Quantité invalide. Entrez un nombre supérieur à 0.</red>"
  no-item: "<red>✖ Cet item n'est pas vendable ou n'existe pas.</red>"
  error: "<red>✖ Une erreur s'est produite lors de la vente.</red>"

# ═══════════════════════════════════════════════════════════════════════════
#   🔍 SECTION 3: MESSAGES DE RECHERCHE (OFFRES D'ACHAT)
# ═══════════════════════════════════════════════════════════════════════════

research:
  order-created: "<green>✔ Offre créée avec succès !</green>\n<gray>Item: <white>%item%</white>\n<gray>Quantité: <white>%quantity%</white>\n<gray>Prix total: <gold>%total_price%€</gold>"
  order-cancelled: "<yellow>⚠ Création d'offre annulée.</yellow>"
  insufficient-stock: "<red>✖ Vous devez avoir au moins 1 item en stock pour créer une offre.</red>"
  invalid-quantity: "<red>✖ Quantité invalide (min: 1, max: %max%).</red>"
  invalid-price: "<red>✖ Prix invalide.</red>"
  already-exists: "<red>✖ Vous avez déjà une offre pour cet item.</red>"
  order-deleted: "<yellow>⚠ Offre supprimée.</yellow>"
  
# ═══════════════════════════════════════════════════════════════════════════
#   📦 SECTION 4: MESSAGES DE STOCKAGE
# ═══════════════════════════════════════════════════════════════════════════

storage:
  item-added: "<green>✔ <white>%quantity%x %item%</white> ajouté au stockage.</green>"
  item-removed: "<yellow>⚠ <white>%quantity%x %item%</white> retiré du stockage.</yellow>"
  storage-full: "<red>✖ Stockage plein ! Impossible d'ajouter plus d'items.</red>"
  invalid-item: "<red>✖ Cet item ne peut pas être stocké.</red>"
  limit-reached-1: "<red>L'item %item_display_name% est arrivé à la limite de %limite%</red>"
  limit-reached-2: "<red>Vous ne pouvez pas stocker plus de %limite% items pour: %item_display_name%</red>"
  
# ═══════════════════════════════════════════════════════════════════════════
#   🤝 SECTION 5: MESSAGES D'ORDRES (VENTE AUX ACHETEURS)
# ═══════════════════════════════════════════════════════════════════════════

orders:
  # Messages pour le vendeur
  seller:
    order-accepted: "<green>✔ Vous avez vendu <white>%quantity%x %item%</white> à <aqua>%buyer%</aqua> pour <gold>%total_price%€</gold>!</green>"
    insufficient-stock: "<red>✖ Vous n'avez pas assez de stock pour vendre cette quantité.</red>"
    order-not-found: "<red>✖ Cet ordre n'existe plus.</red>"
    
  # Messages pour l'acheteur
  buyer:
    order-completed: "<green>✔ <aqua>%seller%</aqua> vous a vendu <white>%quantity%x %item%</white> !</green>\n<gray>Total dépensé: <gold>%total_price%€</gold>"
    order-expired: "<yellow>⚠ Votre offre pour <white>%item%</white> a expiré.</yellow>"
    
  # Messages d'erreur
  invalid-order: "<red>✖ Ordre invalide ou déjà traité.</red>"
  cannot-sell-own-order: "<red>✖ Vous ne pouvez pas vendre à votre propre offre.</red>"

# ═══════════════════════════════════════════════════════════════════════════
#   📊 SECTION 6: COMMANDE /offre (Création offre en main)
# ═══════════════════════════════════════════════════════════════════════════

offre:
  usage: "<yellow>Usage: /offre <quantité> <prix_unitaire></yellow>"
  no-item-in-hand: "<red>✖ Vous devez tenir un item en main !</red>"
  invalid-quantity: "<red>✖ Quantité invalide (doit être > 0).</red>"
  invalid-price: "<red>✖ Prix invalide (doit être > 0).</red>"
  success: "<green>✔ Offre créée avec succès !</green>\n<gray>Item: <white>%item%</white>\n<gray>Quantité: <white>%quantity%</white>\n<gray>Prix unitaire: <gold>%price%€</gold>\n<gray>Prix total: <gold>%total_price%€</gold>"
  already-exists: "<red>✖ Vous avez déjà une offre active pour cet item.</red>"
  unstackable-item: "<red>✖ Cet item ne peut pas être vendu (item non empilable ou trop complexe).</red>"

# ═══════════════════════════════════════════════════════════════════════════
#   🔧 SECTION 7: COMMANDE /quantum (Admin)
# ═══════════════════════════════════════════════════════════════════════════

quantum:
  help:
    header: "<gradient:#32b8c6:#1d6880>╔═══════════════════════════════════╗</gradient>\n<gradient:#32b8c6:#1d6880>║     QUANTUM STORAGE - HELP       ║</gradient>\n<gradient:#32b8c6:#1d6880>╚═══════════════════════════════════╝</gradient>"
    commands:
      - "<yellow>/storage</yellow> <gray>- Ouvrir le stockage</gray>"
      - "<yellow>/offre <quantité> <prix></yellow> <gray>- Créer offre en main</gray>"
      - "<yellow>/quantum reload</yellow> <gray>- Recharger la config</gray>"
      - "<yellow>/quantum help</yellow> <gray>- Afficher l'aide</gray>"
    footer: "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
  
  stats:
    header: "<gradient:#32b8c6:#1d6880>╔═══════════════════════════════════╗</gradient>\n<gradient:#32b8c6:#1d6880>║     QUANTUM STORAGE - STATS      ║</gradient>\n<gradient:#32b8c6:#1d6880>╚═══════════════════════════════════╝</gradient>"
    total-volume: "<gray>Volume total échangé: <white>%volume%€</white></gray>"
    active-offers: "<gray>Offres actives: <white>%offers%</white></gray>"
    total-players: "<gray>Joueurs actifs: <white>%players%</white></gray>"
    footer: "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"

# ═══════════════════════════════════════════════════════════════════════════
#   ❌ SECTION 8: MESSAGES D'ERREUR
# ═══════════════════════════════════════════════════════════════════════════

error:
  database:
    connection-failed: "<red>✖ Erreur de connexion à la base de données.</red>"
    query-failed: "<red>✖ Erreur lors de l'exécution de la requête SQL.</red>"
  
  economy:
    insufficient-funds: "<red>✖ Fonds insuffisants ! Il vous faut <gold>%required%€</gold>.</red>"
    transaction-failed: "<red>✖ Erreur lors de la transaction économique.</red>"
  
  menu:
    failed-to-open: "<red>✖ Impossible d'ouvrir le menu.</red>"
    invalid-action: "<red>✖ Action invalide.</red>"

# ═══════════════════════════════════════════════════════════════════════════
#   ℹ️ SECTION 9: MESSAGES INFORMATIFS
# ═══════════════════════════════════════════════════════════════════════════

info:
  mode-changed: "<gray>Mode changé en: <aqua>%mode%</aqua></gray>"
  session-created: "<gray>Session créée pour: <white>%item%</white></gray>"
  session-expired: "<yellow>⚠ Session expirée.</yellow>"

# ═══════════════════════════════════════════════════════════════════════════
#   🎮 SECTION 9b: MESSAGES DE GAMEMODE
# ═══════════════════════════════════════════════════════════════════════════

gamemode:
  player-only: "<red>✖ Cette commande ne peut être exécutée que par un joueur.</red>"
  unknown-command: "<red>✖ Commande de gamemode inconnue.</red>"
  no-permission: "<red>✖ Vous n'avez pas la permission de changer en mode %mode%.</red>"
