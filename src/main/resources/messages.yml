    header: "<yellow>=== Commandes Outils Quantum ===</yellow>"
    commands:
      - "<gray>/tool upgrade <white>- Améliorer l'outil en main</white></gray>"
      - "<gray>/tool info <white>- Afficher les infos de l'outil</white></gray>"
      - "<gray>/tool give <type> <niveau> <white>- Obtenir un outil</white></gray>"

